<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fluorite Market</title>

<style>
body { margin:0; background:#000; color:white; font-family:Arial; }

header {
  text-align:center;
  padding:15px;
  color:#00ffcc;
  font-size:22px;
}

.container { padding:15px; }

.card {
  background:#111;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 0 10px #00ffcc55;
}

.btn {
  background:#00ffcc;
  padding:8px 12px;
  border-radius:8px;
  color:black;
  text-decoration:none;
  display:inline-block;
  margin-top:8px;
}

input {
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.admin {
  display:none;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
  text-decoration:none;
}
</style>

</head>

<body>

<header>FLUORITE MARKET</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="card admin" id="adminPanel">
<h3>Add Product</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<button class="btn" onclick="addProduct()">Add</button>
</div>

<!-- PRODUCTS -->
<h2>🛒 Products</h2>
<div id="products"></div>

<!-- ORDER -->
<div class="card">
<h3>💳 Order</h3>
<input id="name" placeholder="Your Name">
<input id="number" placeholder="Phone">
<input id="product" placeholder="Product Name">
<button class="btn" onclick="order()">Order Now</button>
</div>

</div>

<a href="https://wa.me/923352523630" class="whatsapp">💬</a>

<script>

// LOGIN
function login(){
  let pass = document.getElementById("pass").value;
  if(pass === "1234"){
    document.getElementById("adminPanel").style.display="block";
    alert("Login Success");
  } else {
    alert("Wrong Password");
  }
}

// ADD PRODUCT (LOCAL)
function addProduct(){
  let name = pname.value;
  let price = pprice.value;

  let products = JSON.parse(localStorage.getItem("products")) || [];

  products.push({name, price});
  localStorage.setItem("products", JSON.stringify(products));

  loadProducts();
}

// LOAD PRODUCTS
function loadProducts(){
  let products = JSON.parse(localStorage.getItem("products")) || [];
  let html = "";

  products.forEach(p=>{
    html += `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.price}</p>
      <a href="https://wa.me/923352523630" class="btn">Buy</a>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

loadProducts();

// ORDER
function order(){
  let msg = `Order:%0AName: ${name.value}%0APhone: ${number.value}%0AProduct: ${product.value}`;
  window.open("https://wa.me/923352523630?text="+msg);
}

</script>

</body>
</html>
