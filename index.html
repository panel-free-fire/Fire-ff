<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fluorite Market</title>

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:white; }
header { text-align:center; padding:15px; color:#00ffcc; font-size:24px; }
.container { padding:20px; }

.card {
  background:#1a1a1a;
  padding:15px;
  margin:10px;
  border-radius:12px;
  box-shadow:0 0 10px #00ffcc55;
}

.btn {
  background:#00ffcc;
  padding:8px;
  border:none;
  border-radius:8px;
  color:black;
  cursor:pointer;
}

input {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.admin {
  display:none;
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
  text-decoration:none;
}
</style>

</head>

<body>

<header>FLUORITE MARKET</header>

<div class="container">

<!-- 🔐 LOGIN -->
<div class="card">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Enter Password">
<button class="btn" onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminPanel">
<h3>Add Product</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<button class="btn" onclick="addProduct()">Add</button>
</div>

<!-- PRODUCTS -->
<h2>🛒 Products</h2>
<div id="products"></div>

<!-- ORDER FORM -->
<div class="card">
<h3>💳 Place Order</h3>
<input id="name" placeholder="Your Name"><br>
<input id="number" placeholder="Phone Number"><br>
<input id="product" placeholder="Product Name"><br>
<input type="file" id="file"><br>
<button class="btn" onclick="order()">Submit Order</button>
</div>

</div>

<a href="https://wa.me/923352523630" class="whatsapp">💬</a>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>

// 🔴 APNA FIREBASE CONFIG YAHA PASTE KARO
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// 🔐 LOGIN
function login(){
  let pass = document.getElementById("pass").value;
  if(pass === "1234"){ // password change kar lena
    document.getElementById("adminPanel").style.display="block";
    alert("Login Success");
  } else {
    alert("Wrong Password");
  }
}

// ➕ ADD PRODUCT
function addProduct(){
  let name = pname.value;
  let price = pprice.value;

  db.collection("products").add({name, price});
  alert("Added");
}

// 🛒 LOAD PRODUCTS
db.collection("products").onSnapshot((data)=>{
  let html="";
  data.forEach(doc=>{
    let p=doc.data();
    html+=`
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.price}</p>
      <a href="https://wa.me/923352523630" class="btn">Buy</a>
    </div>`;
  });
  products.innerHTML=html;
});

// 💳 ORDER + IMAGE UPLOAD
function order(){
  let file = document.getElementById("file").files[0];

  let ref = storage.ref("payments/"+file.name);
  ref.put(file).then(()=>{
    ref.getDownloadURL().then((url)=>{

      db.collection("orders").add({
        name: name.value,
        number: number.value,
        product: product.value,
        screenshot: url
      });

      alert("Order Submitted");
    });
  });
}

</script>

</body>
</html>
