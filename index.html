<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fluorite Market</title>

<style>
body { background:#0d0d0d; color:white; font-family:Arial; }
h1 { text-align:center; color:#00ffcc; }
.container { padding:20px; }
.card {
  background:#1a1a1a;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
.btn {
  background:#00ffcc;
  padding:8px;
  text-decoration:none;
  color:black;
  border-radius:8px;
}
</style>

</head>

<body>

<h1>FLUORITE MARKET</h1>

<div class="container" id="products"></div>

<a href="https://wa.me/923352523630" class="btn">💬 WhatsApp</a>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
// 🔴 YAHAN apna Firebase config paste karo
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Load Products
db.collection("products").onSnapshot((data)=>{
  let html = "";
  data.forEach(doc=>{
    let p = doc.data();
    html += `
    <div class="card">
      <h3>${p.name}</h3>
      <p>Price: ${p.price}</p>
      <a href="https://wa.me/923352523630" class="btn">Buy</a>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
});
</script>

</body>
</html>
